# Element Classification
adsorbates: ["C", "H", "O"]
lattice_non_metals: ["O"]  # Typically oxygen in an oxide surface (TiO2, CeO2, etc.)

# Graph Parameters
cutoffs:
  "H-H": 0.84
  "C-H": 1.19
  "C-C": 1.64
  "H-O": 1.08
  "O-O": 1.58
  "C-O": 1.53
  "C-M": 2.20
  "M-O": 2.10
  "H-M": 1.80

bond_hysteresis: 0.15
pbc: [true, true, false]
break_surface_bonds: true  # Prevents Metals from bonding to Lattice Oxygens

# Depth & Surface Masking (Relative to Metal Surface Z-height)
surface_metal_z_percentile: 98.0
lattice_non_metal_tolerance: 0.7 
depth_cutoffs:
  adsorbates: -0.5
  surface_metals: -2.0
  lattice_non_metals: -2.0

# Species Mappings (Counts of [C, H, O])
species_map:
  "1,4,0": "CH4"
  "1,3,0": "CH3"
  "1,2,0": "CH2"
  "1,1,0": "CH"
  "0,0,2": "O2"
  "0,2,1": "H2O"
  "1,0,1": "CO"
  "1,0,2": "CO2"
  "0,2,0": "H2"
  "0,1,1": "OH"
  "1,2,1": "CH2O"
  "1,3,1": "CH3O"
  "1,1,1": "HCO"
  "0,0,1": "O"
  "0,1,0": "H"
  "2,4,0": "C2H4"
  "2,6,0": "C2H6"
  "2,4,1": "C2H4O"
  "2,3,1": "C2H3O"