[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "species_identifier"
version = "0.1.0"
dependencies = [
    "ase",
    "numpy",
    "pyyaml",
]

[project.scripts]
species-analyze = "analyzer:main"

[tool.setuptools.packages.find]
where = ["src"]